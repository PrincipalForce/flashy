<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vectid - Retro Space Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #c0f0ff; }
  h1 { margin-bottom: 4px; font-size: 22px; color: #00ffcc; letter-spacing: 3px; text-shadow: 0 0 10px #00ffcc; }
  p.info { font-size: 12px; margin-bottom: 10px; opacity: 0.6; }
  canvas { border: 1px solid #0a2a3a; border-radius: 4px; cursor: none; }
</style>
</head>
<body>
<h1>SPACE BLASTER</h1>
<p class="info">Move mouse to steer | Click to shoot | Destroy all aliens!</p>
<canvas id="stage"></canvas>
<script src="../vectid.js"></script>
<script>
(function () {
  const { Stage, MovieClip, Shape, TextField } = Vectid;
  const W = 960, H = 540;
  const canvas = document.getElementById('stage');
  const stage = new Stage(canvas, { width: W, height: H, fps: 30, backgroundColor: 0x030816 });
  const root = stage.root;

  // --- game state ---
  let score = 0, lives = 3, gameOver = false, shakeFrames = 0, shakeMag = 0;
  let bullets = [], enemies = [], particles = [], stars = [];
  let enemyDir = 1, enemySpeed = 1.2, waveNum = 0;
  let flashAlpha = 0;

  // --- starfield ---
  const starLayer = new MovieClip();
  root.addChild(starLayer);
  for (let i = 0; i < 80; i++) {
    const s = new Shape();
    const sz = 0.5 + Math.random() * 2;
    const bright = 0.3 + Math.random() * 0.7;
    s.graphics.beginFill(0xffffff, bright).drawCircle(0, 0, sz).endFill();
    s.x = Math.random() * W;
    s.y = Math.random() * H;
    s._speed = 0.3 + Math.random() * 1.5;
    starLayer.addChild(s);
    stars.push(s);
  }

  // --- HUD ---
  const scoreTf = new TextField('SCORE: 0', { font: 'bold 18px Courier New', color: 0x00ffcc, align: 'left', baseline: 'top' });
  scoreTf.x = 12; scoreTf.y = 10;
  const livesTf = new TextField('', { font: 'bold 18px Courier New', color: 0xff4466, align: 'right', baseline: 'top' });
  livesTf.x = W - 12; livesTf.y = 10;
  const waveTf = new TextField('', { font: 'bold 14px Courier New', color: 0x8888aa, align: 'center', baseline: 'top' });
  waveTf.x = W / 2; waveTf.y = 10;

  // --- ship ---
  const ship = new MovieClip();
  ship.x = W / 2; ship.y = H - 60;
  // body
  ship.graphics
    .beginFill(0x00ddff, 1)
    .moveTo(0, -20).lineTo(14, 16).lineTo(-14, 16).closePath()
    .endFill()
    .beginFill(0x0088cc, 1)
    .moveTo(0, -10).lineTo(8, 12).lineTo(-8, 12).closePath()
    .endFill();
  // engine flame
  const flame = new Shape();
  flame.y = 16;
  flame.graphics
    .beginFill(0xff6600, 0.9)
    .moveTo(-6, 0).lineTo(0, 18).lineTo(6, 0).closePath()
    .endFill()
    .beginFill(0xffff00, 0.8)
    .moveTo(-3, 0).lineTo(0, 12).lineTo(3, 0).closePath()
    .endFill();
  ship.addChild(flame);

  // --- layers ---
  const bulletLayer = new MovieClip();
  const enemyLayer = new MovieClip();
  const particleLayer = new MovieClip();
  root.addChild(bulletLayer);
  root.addChild(enemyLayer);
  root.addChild(ship);
  root.addChild(particleLayer);

  // flash overlay
  const flashOverlay = new Shape();
  flashOverlay.graphics.beginFill(0xffffff, 1).drawRect(0, 0, W, H).endFill();
  flashOverlay.alpha = 0;
  root.addChild(flashOverlay);

  // HUD on top
  root.addChild(scoreTf);
  root.addChild(livesTf);
  root.addChild(waveTf);

  // game over overlay
  const goTf = new TextField('GAME OVER', { font: 'bold 48px Courier New', color: 0xff2244, align: 'center', baseline: 'middle' });
  goTf.x = W / 2; goTf.y = H / 2 - 20; goTf.visible = false;
  const restartTf = new TextField('Click to restart', { font: '20px Courier New', color: 0xaaaacc, align: 'center', baseline: 'middle' });
  restartTf.x = W / 2; restartTf.y = H / 2 + 30; restartTf.visible = false;
  root.addChild(goTf);
  root.addChild(restartTf);

  // --- life icons ---
  const lifeIcons = [];
  function updateLivesDisplay() {
    lifeIcons.forEach(ic => ic.removeFromParent());
    lifeIcons.length = 0;
    livesTf.text = 'LIVES:';
    for (let i = 0; i < lives; i++) {
      const ic = new Shape();
      ic.graphics.beginFill(0xff4466, 1)
        .moveTo(0, -8).lineTo(6, 6).lineTo(-6, 6).closePath().endFill();
      ic.x = W - 90 + i * 22; ic.y = 18;
      root.addChild(ic);
      lifeIcons.push(ic);
    }
  }

  // --- create bullet ---
  function fireBullet() {
    const b = new Shape();
    b.graphics.beginFill(0x00ffcc, 1).drawRect(-2, -8, 4, 12).endFill();
    b.shadowBlur = 8; b.shadowColor = 0x00ffcc;
    b.x = ship.x; b.y = ship.y - 22;
    bulletLayer.addChild(b);
    bullets.push(b);
  }

  // --- create enemy ---
  function createEnemy(ex, ey, type) {
    const e = new MovieClip();
    e.x = ex; e.y = ey;
    e._hp = 1; e._type = type;
    const colors = [0xff4466, 0xff8800, 0xcc44ff, 0x44ff88, 0xffcc00];
    const col = colors[type % colors.length];
    if (type % 3 === 0) {
      // diamond
      e.graphics.beginFill(col, 1)
        .moveTo(0, -14).lineTo(14, 0).lineTo(0, 14).lineTo(-14, 0).closePath().endFill()
        .lineStyle(1, 0xffffff, 0.3)
        .moveTo(0, -14).lineTo(14, 0).lineTo(0, 14).lineTo(-14, 0).closePath();
    } else if (type % 3 === 1) {
      // octagon
      e.graphics.beginFill(col, 1);
      const r = 13, sides = 8;
      for (let i = 0; i < sides; i++) {
        const a = (Math.PI * 2 * i) / sides - Math.PI / 2;
        const px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (i === 0) e.graphics.moveTo(px, py); else e.graphics.lineTo(px, py);
      }
      e.graphics.closePath().endFill();
    } else {
      // hexagon
      e.graphics.beginFill(col, 1);
      const r = 13, sides = 6;
      for (let i = 0; i < sides; i++) {
        const a = (Math.PI * 2 * i) / sides - Math.PI / 2;
        const px = Math.cos(a) * r, py = Math.sin(a) * r;
        if (i === 0) e.graphics.moveTo(px, py); else e.graphics.lineTo(px, py);
      }
      e.graphics.closePath().endFill();
    }
    e.shadowBlur = 6; e.shadowColor = col;
    enemyLayer.addChild(e);
    enemies.push(e);
  }

  // --- spawn wave ---
  function spawnWave() {
    waveNum++;
    waveTf.text = 'WAVE ' + waveNum;
    const rows = Math.min(3 + Math.floor(waveNum / 2), 5);
    const cols = Math.min(6 + waveNum, 12);
    const spacingX = 56, spacingY = 44;
    const startX = (W - (cols - 1) * spacingX) / 2;
    const startY = 50;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        createEnemy(startX + c * spacingX, startY + r * spacingY, r + waveNum);
      }
    }
    enemyDir = 1;
    enemySpeed = 1.2 + waveNum * 0.3;
  }

  // --- explosion particles ---
  function explode(ex, ey, color, count) {
    for (let i = 0; i < count; i++) {
      const p = new Shape();
      const sz = 1 + Math.random() * 3;
      p.graphics.beginFill(color, 1).drawCircle(0, 0, sz).endFill();
      p.x = ex; p.y = ey;
      p.shadowBlur = 4; p.shadowColor = color;
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 4;
      p._vx = Math.cos(angle) * speed;
      p._vy = Math.sin(angle) * speed;
      p._life = 20 + Math.random() * 15;
      p._maxLife = p._life;
      particleLayer.addChild(p);
      particles.push(p);
    }
  }

  // --- hit flash ---
  function hitFlash() { flashAlpha = 0.3; }
  function deathShake() { shakeFrames = 12; shakeMag = 6; }

  // --- restart ---
  function restartGame() {
    score = 0; lives = 3; gameOver = false; waveNum = 0;
    bullets.forEach(b => b.removeFromParent()); bullets.length = 0;
    enemies.forEach(e => e.removeFromParent()); enemies.length = 0;
    particles.forEach(p => p.removeFromParent()); particles.length = 0;
    goTf.visible = false; restartTf.visible = false;
    ship.visible = true; ship.x = W / 2; ship.y = H - 60;
    scoreTf.text = 'SCORE: 0';
    updateLivesDisplay();
    spawnWave();
  }

  // --- input ---
  stage.addEventListener('mouseMove', function (e) {
    if (!gameOver) {
      ship.x = Math.max(16, Math.min(W - 16, e.stageX));
    }
  });

  let canShoot = true;
  stage.addEventListener('click', function () {
    if (gameOver) { restartGame(); return; }
    if (canShoot) {
      fireBullet();
      canShoot = false;
      setTimeout(function () { canShoot = true; }, 120);
    }
  });

  // --- main loop ---
  stage.addEventListener('enterFrame', function () {
    if (gameOver) return;

    // screen shake
    if (shakeFrames > 0) {
      root.x = (Math.random() - 0.5) * shakeMag;
      root.y = (Math.random() - 0.5) * shakeMag;
      shakeFrames--;
      shakeMag *= 0.85;
    } else {
      root.x = 0; root.y = 0;
    }

    // flash fade
    if (flashAlpha > 0) {
      flashAlpha *= 0.8;
      if (flashAlpha < 0.01) flashAlpha = 0;
    }
    flashOverlay.alpha = flashAlpha;

    // scrolling stars
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      s.y += s._speed;
      if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    }

    // flame flicker
    flame.alpha = 0.6 + Math.random() * 0.4;
    flame.scaleX = 0.8 + Math.random() * 0.4;
    flame.scaleY = 0.7 + Math.random() * 0.6;

    // update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.y -= 12;
      if (b.y < -20) { b.removeFromParent(); bullets.splice(i, 1); }
    }

    // update enemies: move sideways + descend
    let leftmost = W, rightmost = 0;
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (e.x < leftmost) leftmost = e.x;
      if (e.x > rightmost) rightmost = e.x;
    }
    if (rightmost > W - 30) enemyDir = -1;
    if (leftmost < 30) enemyDir = 1;
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      e.x += enemyDir * enemySpeed;
      e.y += 0.15 + waveNum * 0.03;
    }

    // collision: bullet vs enemy
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      let hit = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const dx = b.x - e.x, dy = b.y - e.y;
        if (Math.abs(dx) < 16 && Math.abs(dy) < 16) {
          // hit!
          score += 10;
          scoreTf.text = 'SCORE: ' + score;
          const colors = [0xff4466, 0xff8800, 0xcc44ff, 0x44ff88, 0xffcc00];
          explode(e.x, e.y, colors[e._type % colors.length], 10);
          hitFlash();
          e.removeFromParent(); enemies.splice(j, 1);
          b.removeFromParent(); bullets.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;
    }

    // collision: enemy reaches bottom or hits ship
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      // check collision with ship
      const dx = ship.x - e.x, dy = ship.y - e.y;
      if (Math.abs(dx) < 22 && Math.abs(dy) < 22) {
        explode(ship.x, ship.y, 0x00ddff, 20);
        deathShake();
        e.removeFromParent(); enemies.splice(j, 1);
        lives--;
        updateLivesDisplay();
        if (lives <= 0) { endGame(); return; }
        ship.x = W / 2;
        continue;
      }
      // reached bottom
      if (e.y > H + 10) {
        e.removeFromParent(); enemies.splice(j, 1);
        lives--;
        updateLivesDisplay();
        if (lives <= 0) { endGame(); return; }
      }
    }

    // update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p._vx;
      p.y += p._vy;
      p._vy += 0.06;
      p._life--;
      p.alpha = Math.max(0, p._life / p._maxLife);
      if (p._life <= 0) { p.removeFromParent(); particles.splice(i, 1); }
    }

    // spawn new wave if all enemies cleared
    if (enemies.length === 0) spawnWave();
  });

  function endGame() {
    gameOver = true;
    ship.visible = false;
    goTf.visible = true;
    restartTf.visible = true;
    goTf.shadowBlur = 12; goTf.shadowColor = 0xff2244;
    deathShake();
    explode(ship.x, ship.y, 0xff2244, 30);
  }

  // --- init ---
  updateLivesDisplay();
  spawnWave();

  window.__stage = stage;
  stage.start();
})();
</script>
</body>
</html>
